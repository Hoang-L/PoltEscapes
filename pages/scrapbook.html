<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scrapbook — The Escape Logs</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .scrapbook-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    /* Card flip for extra details */
    .flip-card {
      perspective: 1000px;
      height: 480px;
      cursor: pointer;
    }

    .flip-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }

    .flip-card:hover .flip-card-inner,
    .flip-card.flipped .flip-card-inner {
      transform: rotateY(180deg);
    }

    .flip-front, .flip-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .flip-back {
      transform: rotateY(180deg);
      background: var(--bg-2);
      border: 1px solid var(--border-hi);
      padding: 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .back-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }

    .back-venue {
      font-size: 0.85rem;
      color: var(--text-2);
      font-style: italic;
    }

    .back-review {
      font-size: 0.9rem;
      color: var(--text-2);
      line-height: 1.65;
      font-style: italic;
      flex: 1;
    }

    .back-detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0;
      border-top: 1px solid var(--border);
      font-size: 0.83rem;
    }

    .back-detail-row .lbl { color: var(--text-3); font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; }
    .back-detail-row .val { color: var(--text); font-weight: 500; }

    .back-crew {
      font-size: 0.82rem;
      color: var(--text-2);
    }

    .flip-hint {
      position: absolute;
      bottom: 0.75rem;
      right: 0.9rem;
      font-size: 0.65rem;
      color: var(--text-3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .card-image-wrap {
      width: 100%;
      height: 200px;
      background: var(--bg-3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      flex-shrink: 0;
      overflow: hidden;
    }

    .card-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Outcome stripe */
    .outcome-stripe {
      height: 3px;
      background: var(--success);
      flex-shrink: 0;
    }

    .outcome-stripe.fail { background: var(--fail); }

    .sort-bar {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .sort-btn {
      font-size: 0.78rem;
      font-weight: 500;
      padding: 0.35rem 0.8rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-2);
      transition: all var(--transition);
    }

    .sort-btn.active, .sort-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(108,99,255,0.08);
    }
  </style>
</head>
<body>
<div class="page">
  <div style="padding-top:var(--nav-h);"></div>

  <div class="container">
    <div class="section">
      <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.75rem;">
        <div>
          <div class="section-title">Scrapbook</div>
          <div class="section-sub" style="margin:0">Hover a card to see full details</div>
        </div>
        <div class="sort-bar">
          <span class="filter-label">Sort:</span>
          <button class="sort-btn active" data-sort="date-desc">Newest</button>
          <button class="sort-btn" data-sort="date-asc">Oldest</button>
          <button class="sort-btn" data-sort="rating-desc">Top Rated</button>
          <button class="sort-btn" data-sort="name-asc">A–Z</button>
        </div>
      </div>

      <div class="filters-bar" style="margin-bottom:1.75rem;">
        <span class="filter-label">Filter</span>
        <input type="text" class="filter-input" id="f-search" placeholder="Search rooms…">
        <select class="filter-select" id="f-outcome">
          <option value="">All Outcomes</option>
          <option value="escaped">Escaped</option>
          <option value="failed">Failed</option>
        </select>
        <select class="filter-select" id="f-country">
          <option value="">All Countries</option>
        </select>
        <select class="filter-select" id="f-diff">
          <option value="">Any Difficulty</option>
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
          <option value="expert">Expert</option>
        </select>
        <span class="filter-count" id="count"></span>
      </div>

      <div class="scrapbook-grid" id="grid"></div>
    </div>
  </div>
</div>

<footer>
  Update your rooms in <code>../js/data.js</code>
</footer>

<script src="../js/data.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/utils.js"></script>
<script>
injectNav('../');

let sortMode = 'date-desc';

function getSorted(rooms) {
  return [...rooms].sort((a, b) => {
    switch (sortMode) {
      case 'date-asc':    return a.date.localeCompare(b.date);
      case 'date-desc':   return b.date.localeCompare(a.date);
      case 'rating-desc': return (b.rating || 0) - (a.rating || 0);
      case 'name-asc':    return a.name.localeCompare(b.name);
      default:            return 0;
    }
  });
}

function getFiltered() {
  const q       = document.getElementById('f-search').value.toLowerCase();
  const outcome = document.getElementById('f-outcome').value;
  const country = document.getElementById('f-country').value;
  const diff    = document.getElementById('f-diff').value;

  return ROOMS.filter(r => {
    if (q && !`${r.name} ${r.venue} ${r.city} ${r.review || ''}`.toLowerCase().includes(q)) return false;
    if (outcome && r.outcome !== outcome) return false;
    if (country && r.country !== country) return false;
    if (diff && r.difficulty !== diff) return false;
    return true;
  });
}

function render() {
  const rooms = getSorted(getFiltered());
  document.getElementById('count').textContent = `${rooms.length} room${rooms.length !== 1 ? 's' : ''}`;
  const grid = document.getElementById('grid');

  if (!rooms.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <div class="icon">🔍</div><p>No rooms match your filters.</p>
    </div>`;
    return;
  }

  grid.innerHTML = rooms.map((r, i) => `
    <div class="flip-card" onclick="this.classList.toggle('flipped')">
      <div class="flip-card-inner">
        <!-- FRONT -->
        <div class="flip-front card" style="display:flex;flex-direction:column;height:100%;">
          <div class="outcome-stripe ${r.outcome === 'failed' ? 'fail' : ''}"></div>
          <div class="card-image-wrap">
            ${r.photo
              ? `<img src="${r.photo}" alt="${r.name}">`
              : roomEmoji(i)}
          </div>
          <div class="card-content" style="flex:1;display:flex;flex-direction:column;gap:0.4rem;">
            <div class="card-meta">
              ${outcomeBadge(r.outcome)}
              ${timeBadge(r.time)}
              ${difficultyBadge(r.difficulty)}
            </div>
            <div class="card-title-text">${r.name}</div>
            <div class="card-venue">${r.venue}</div>
            <div>${starsHTML(r.rating)}</div>
            <div style="margin-top:auto;">
              <span class="badge badge-loc">${locationStr(r)}</span>
            </div>
            <div style="font-size:0.75rem;color:var(--text-3);margin-top:0.3rem;">${formatDate(r.date)}</div>
          </div>
          <div class="flip-hint">hover to flip ↻</div>
        </div>
        <!-- BACK -->
        <div class="flip-back">
          <div>
            <div class="back-title">${r.name}</div>
            <div class="back-venue">${r.venue} · ${locationStr(r)}</div>
          </div>
          ${r.review
            ? `<div class="back-review">"${r.review}"</div>`
            : `<div class="back-review" style="color:var(--text-3);font-style:normal;">No review written for this room yet.</div>`}
          <div>
            <div class="back-detail-row">
              <span class="lbl">Date</span>
              <span class="val">${formatDate(r.date)}</span>
            </div>
            <div class="back-detail-row">
              <span class="lbl">Outcome</span>
              <span>${outcomeBadge(r.outcome)}</span>
            </div>
            ${r.time ? `<div class="back-detail-row">
              <span class="lbl">Time</span>
              <span class="val">${r.time}</span>
            </div>` : ''}
            ${r.difficulty ? `<div class="back-detail-row">
              <span class="lbl">Difficulty</span>
              <span>${difficultyBadge(r.difficulty)}</span>
            </div>` : ''}
            ${r.rating ? `<div class="back-detail-row">
              <span class="lbl">Rating</span>
              <span>${starsHTML(r.rating)}</span>
            </div>` : ''}
            ${r.group?.length ? `<div class="back-detail-row">
              <span class="lbl">Crew</span>
              <span class="val" style="font-size:0.8rem;">${r.group.join(', ')}</span>
            </div>` : ''}
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

// Sort buttons
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sortMode = btn.dataset.sort;
    render();
  });
});

// Filters
['f-search','f-outcome','f-country','f-diff'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
});

// Populate country filter
const countries = [...new Set(ROOMS.map(r => r.country))].sort();
const cSel = document.getElementById('f-country');
countries.forEach(c => {
  const o = document.createElement('option'); o.value = c; o.textContent = c; cSel.appendChild(o);
});

render();
</script>
</body>
</html>
